name: Проверки

# Ловит то, что тесты не ловят: опечатку в имени, забытый импорт, сломанную сборку.
# Один такой промах уже клал «Финансы» белым экраном на боевом — линтер увидел бы
# его за секунду, но запускать его вручную никто не вспоминал.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Забытый импорт и неопределённая переменная — сюда.
      - name: Линтер
        run: npm run lint

      # Денежная логика: балансы, прибыль, изъятия, переводы.
      - name: Тесты
        run: npm test

      # Сборка обязана проходить: если она падает, деплой выложит старую версию.
      - name: Сборка
        run: npm run build
